<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #22d3ee;
  --accent-glow: rgba(34, 211, 238, 0.25);
  --glass-bg: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --radius: 18px;
  --transition: 0.35s cubic-bezier(.4, 0, .2, 1);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: linear-gradient(160deg, #0c1445 0%, #1a1040 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient glow orbs */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(34, 211, 238, 0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -15%;
  right: -5%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1120px;
  margin: 0 auto;
  padding: 32px 20px 48px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.header i {
  font-size: 1.6rem;
  color: var(--accent);
  filter: drop-shadow(0 0 8px var(--accent-glow));
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text-bright);
  letter-spacing: -0.5px;
}
.header h1 span { color: var(--accent); }

/* City Tabs */
.city-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.city-tab {
  padding: 10px 24px;
  border-radius: 50px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  transition: var(--transition);
  user-select: none;
  outline: none;
}
.city-tab:hover {
  background: rgba(34, 211, 238, 0.1);
  color: var(--text);
  border-color: rgba(34, 211, 238, 0.25);
}
.city-tab.active {
  background: var(--accent);
  color: #0c1445;
  font-weight: 600;
  border-color: var(--accent);
  box-shadow: 0 4px 24px var(--accent-glow), 0 0 0 1px rgba(34,211,238,0.15);
}

/* Glass Card */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.glass:hover {
  border-color: rgba(255, 255, 255, 0.12);
}

/* Hero Section */
.hero {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 40px 36px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(34, 211, 238, 0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-temp {
  font-size: 5.5rem;
  font-weight: 800;
  color: var(--text-bright);
  line-height: 1;
  letter-spacing: -3px;
}
.hero-desc {
  font-size: 1.15rem;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: capitalize;
  font-weight: 400;
}
.hero-city {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hero-city i {
  color: var(--accent);
  font-size: 0.9rem;
}
.hero-date {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.hero-feels {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: var(--accent);
  margin-top: 12px;
  padding: 6px 14px;
  background: rgba(34, 211, 238, 0.08);
  border-radius: 50px;
  border: 1px solid rgba(34, 211, 238, 0.15);
}
.hero-icon {
  font-size: 7rem;
  text-align: center;
  filter: drop-shadow(0 0 30px rgba(34, 211, 238, 0.2));
  animation: heroFloat 4s ease-in-out infinite;
  position: relative;
  z-index: 1;
}
@keyframes heroFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  text-align: center;
  padding: 22px 14px;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: var(--transition);
}
.stat-card:hover::after { opacity: 1; }
.stat-icon {
  font-size: 1.3rem;
  margin-bottom: 10px;
  color: var(--accent);
}
.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.5px;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Section Title */
.section-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title i {
  color: var(--accent);
  font-size: 0.85rem;
}

/* Hourly Scroll */
.hourly-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 10px;
  margin-bottom: 28px;
  scrollbar-width: thin;
  scrollbar-color: rgba(34, 211, 238, 0.3) transparent;
}
.hourly-scroll::-webkit-scrollbar { height: 4px; }
.hourly-scroll::-webkit-scrollbar-track { background: transparent; }
.hourly-scroll::-webkit-scrollbar-thumb {
  background: rgba(34, 211, 238, 0.3);
  border-radius: 4px;
}
.hourly-card {
  min-width: 95px;
  text-align: center;
  padding: 18px 14px;
  flex-shrink: 0;
  cursor: default;
}
.hourly-card:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(34, 211, 238, 0.15);
}
.hourly-time {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-weight: 500;
}
.hourly-icon { font-size: 1.8rem; margin-bottom: 10px; }
.hourly-temp {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-bright);
}

/* 7-Day Forecast */
.daily-list { margin-bottom: 24px; }
.daily-row {
  display: grid;
  grid-template-columns: 110px 40px 1fr 80px;
  align-items: center;
  gap: 10px;
  padding: 15px 22px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  transition: background 0.2s;
}
.daily-row:hover { background: rgba(255, 255, 255, 0.03); }
.daily-row:last-child { border-bottom: none; }
.daily-day { font-size: 0.9rem; font-weight: 500; color: var(--text); }
.daily-icon { font-size: 1.35rem; text-align: center; }
.daily-bar-wrap { display: flex; align-items: center; gap: 10px; }
.daily-low {
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 32px;
  text-align: right;
}
.daily-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255, 255, 255, 0.06);
  overflow: hidden;
}
.daily-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  transition: width var(--transition);
}
.daily-high {
  font-size: 0.8rem;
  color: var(--text-bright);
  font-weight: 600;
  min-width: 32px;
}
.daily-rain {
  font-size: 0.75rem;
  color: var(--accent);
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.daily-rain i { font-size: 0.65rem; }

/* Chart */
.chart-wrap {
  margin-bottom: 24px;
  padding: 28px;
}
.chart-wrap canvas { max-height: 240px; }

/* Details Grid */
.details-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.detail-card { padding: 22px; }
.detail-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(34, 211, 238, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  color: var(--accent);
  font-size: 0.9rem;
}
.detail-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.detail-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-bright);
}
.detail-sub {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px 0 0;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.footer a {
  color: var(--accent);
  text-decoration: none;
}

/* Fade animation */
.fade-section {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.fade-section.fading {
  opacity: 0;
  transform: translateY(10px);
}

/* Responsive */
@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    text-align: center;
    padding: 28px 24px;
  }
  .hero-city { justify-content: center; }
  .hero-icon { font-size: 5rem; order: -1; }
  .hero-temp { font-size: 4rem; }
  .hero-feels { margin: 12px auto 0; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .details-grid { grid-template-columns: 1fr 1fr; }
  .daily-row { grid-template-columns: 80px 32px 1fr 60px; padding: 12px 16px; }
}

@media (max-width: 480px) {
  .container { padding: 20px 14px 36px; }
  .city-tabs { gap: 6px; }
  .city-tab { padding: 8px 16px; font-size: 0.8rem; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .details-grid { grid-template-columns: 1fr; }
  .hero-temp { font-size: 3.2rem; }
  .hero-icon { font-size: 4rem; }
  .chart-wrap { padding: 16px; }
}
</style>
</head>

function formatDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function getDewPointDesc(dp) {
  if (dp > 20) return "Oppressive";
  if (dp > 18) return "Humid";
  if (dp > 10) return "Comfortable";
  return "Dry";
}

function getPressureDesc(p) {
  if (p >= 1020) return "High pressure";
  if (p >= 1010) return "Normal";
  return "Low pressure";
}

function getUVDesc(uv) {
  if (uv >= 11) return "Extreme";
  if (uv >= 8) return "Very High";
  if (uv >= 6) return "High";
  if (uv >= 3) return "Moderate";
  return "Low";
}

function renderTabs() {
  var tabs = document.querySelectorAll('.city-tab');
  var cityKeys = ['islamabad', 'london', 'dubai', 'riyadh', 'newyork'];
  for (var i = 0; i < tabs.length; i++) {
    if (cityKeys[i] === activeCity) {
      tabs[i].classList.add('active');
    } else {
      tabs[i].classList.remove('active');
    }
  }
}

function renderApp(d) {
  var hourlyHTML = '';
  for (var i = 0; i < d.hourly.length; i++) {
    var h = d.hourly[i];
    hourlyHTML += '<div class="glass hourly-card">' +
      '<div class="hourly-time">' + h.time + '</div>' +
      '<div class="hourly-icon">' + h.icon + '</div>' +
      '<div class="hourly-temp">' + h.temp + '\u00B0</div>' +
      '</div>';
  }

  var dailyHTML = '';
  for (var j = 0; j < d.daily.length; j++) {
    var day = d.daily[j];
    var barPct = ((day.high - day.low) / 30) * 100;
    if (barPct > 100) barPct = 100;
    dailyHTML += '<div class="daily-row">' +
      '<div class="daily-day">' + day.day + '</div>' +
      '<div class="daily-icon">' + day.icon + '</div>' +
      '<div class="daily-bar-wrap">' +
        '<span class="daily-low">' + day.low + '\u00B0</span>' +
        '<div class="daily-bar"><div class="daily-bar-fill" style="width:' + barPct + '%"></div></div>' +
        '<span class="daily-high">' + day.high + '\u00B0</span>' +
      '</div>' +
      '<div class="daily-rain"><i class="fa-solid fa-droplet"></i> ' + day.rain + '%</div>' +
      '</div>';
  }

  return '' +
    '<!-- Hero -->' +
    '<div class="glass hero">' +
      '<div>' +
        '<div class="hero-temp">' + d.temp + '\u00B0C</div>' +
        '<div class="hero-desc">' + d.desc + '</div>' +
        '<div class="hero-city"><i class="fa-solid fa-location-dot"></i> ' + d.name + '</div>' +
        '<div class="hero-date">' + formatDate() + '</div>' +
        '<div class="hero-feels"><i class="fa-solid fa-temperature-half"></i> Feels like ' + d.feels + '\u00B0C</div>' +
      '</div>' +
      '<div class="hero-icon">' + d.icon + '</div>' +
    '</div>' +

    '<!-- Stats -->' +
    '<div class="stats-row">' +
      '<div class="glass stat-card">' +
        '<div class="stat-icon"><i class="fa-solid fa-droplet"></i></div>' +
        '<div class="stat-value">' + d.humidity + '%</div>' +
        '<div class="stat-label">Humidity</div>' +
      '</div>' +
      '<div class="glass stat-card">' +
        '<div class="stat-icon"><i class="fa-solid fa-wind"></i></div>' +
        '<div class="stat-value">' + d.wind + '</div>' +
        '<div class="stat-label">Wind km/h</div>' +
      '</div>' +
      '<div class="glass stat-card">' +
        '<div class="stat-icon"><i class="fa-solid fa-sun"></i></div>' +
        '<div class="stat-value">' + d.uv + '</div>' +
        '<div class="stat-label">UV Index</div>' +
      '</div>' +
      '<div class="glass stat-card">' +
        '<div class="stat-icon"><i class="fa-solid fa-eye"></i></div>' +
        '<div class="stat-value">' + d.visibility + '</div>' +
        '<div class="stat-label">Visibility km</div>' +
      '</div>' +
    '</div>' +

    '<!-- 24-Hour Forecast -->' +
    '<div class="section-title"><i class="fa-solid fa-clock"></i> 24-Hour Forecast</div>' +
    '<div class="hourly-scroll">' + hourlyHTML + '</div>' +

    '<!-- 7-Day Forecast -->' +
    '<div class="section-title"><i class="fa-solid fa-calendar-week"></i> 7-Day Forecast</div>' +
    '<div class="glass daily-list">' + dailyHTML + '</div>' +

    '<!-- Temperature Chart -->' +
    '<div class="section-title"><i class="fa-solid fa-chart-line"></i> Temperature Trend</div>' +
    '<div class="glass chart-wrap"><canvas id="tempChart"></canvas></div>' +

    '<!-- Detail Cards -->' +
    '<div class="section-title"><i class="fa-solid fa-circle-info"></i> Weather Details</div>' +
    '<div class="details-grid">' +
      '<div class="glass detail-card">' +
        '<div class="detail-icon"><i class="fa-solid fa-sun"></i></div>' +
        '<div class="detail-label">Sunrise & Sunset</div>' +
        '<div class="detail-value">' + d.sunrise + '</div>' +
        '<div class="detail-sub"><i class="fa-solid fa-moon"></i> ' + d.sunset + '</div>' +
      '</div>' +
      '<div class="glass detail-card">' +
        '<div class="detail-icon"><i class="fa-solid fa-gauge-high"></i></div>' +
        '<div class="detail-label">Pressure</div>' +
        '<div class="detail-value">' + d.pressure + ' hPa</div>' +
        '<div class="detail-sub">' + getPressureDesc(d.pressure) + '</div>' +
      '</div>' +
      '<div class="glass detail-card">' +
        '<div class="detail-icon"><i class="fa-solid fa-temperature-low"></i></div>' +
        '<div class="detail-label">Dew Point</div>' +
        '<div class="detail-value">' + d.dewPoint + '\u00B0C</div>' +
        '<div class="detail-sub">' + getDewPointDesc(d.dewPoint) + '</div>' +
      '</div>' +
    '</div>';
}

function buildChart(d) {
  var ctx = document.getElementById('tempChart');
  if (!ctx) return;
  if (tempChart) { tempChart.destroy(); tempChart = null; }

  var labels = [];
  var lows = [];
  for (var i = 0; i < d.daily.length; i++) {
    labels.push(d.daily[i].day);
    lows.push(d.daily[i].low);
  }

  tempChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'High \u00B0C',
        data: d.chartTemps,
        borderColor: '#22d3ee',
        backgroundColor: 'rgba(34, 211, 238, 0.08)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#22d3ee',
        pointBorderColor: '#22d3ee',
        pointRadius: 5,
        pointHoverRadius: 8,
        borderWidth: 2.5
      }, {
        label: 'Low \u00B0C',
        data: lows,
        borderColor: '#a78bfa',
        backgroundColor: 'rgba(167, 139, 250, 0.06)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#a78bfa',
        pointBorderColor: '#a78bfa',
        pointRadius: 5,
        pointHoverRadius: 8,
        borderWidth: 2.5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          labels: {
            color: '#94a3b8',
            font: { family: 'Inter', size: 12 },
            usePointStyle: true,
            pointStyle: 'circle',
            padding: 20
          }
        },
        tooltip: {
          backgroundColor: 'rgba(12, 20, 69, 0.9)',
          titleColor: '#f8fafc',
          bodyColor: '#e2e8f0',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          cornerRadius: 10,
          padding: 12,
          titleFont: { family: 'Inter', weight: '600' },
          bodyFont: { family: 'Inter' },
          callbacks: {
            label: function(context) {
              return context.dataset.label + ': ' + context.parsed.y + '\u00B0';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#94a3b8', font: { family: 'Inter', size: 11 } },
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false }
        },
        y: {
          ticks: {
            color: '#94a3b8',
            font: { family: 'Inter', size: 11 },
            callback: function(v) { return v + '\u00B0'; }
          },
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false }
        }
      }
    }
  });
}

function switchCity(city) {
  if (city === activeCity) return;
  activeCity = city;
  renderTabs();
  var app = document.getElementById('app');
  app.classList.add('fading');
  setTimeout(function() {
    app.innerHTML = renderApp(weatherData[city]);
    buildChart(weatherData[city]);
    app.classList.remove('fading');
  }, 300);
}

/* ──── Initial Render ──── */
renderTabs();
document.getElementById('app').innerHTML = renderApp(weatherData[activeCity]);
buildChart(weatherData[activeCity]);
</script>
</body>
</html>
