<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherPulse</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C1445;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);--accent:#0EA5E9;--accent-glow:rgba(14,165,233,0.3);--text:#e2e8f0;--text-dim:#94a3b8;--text-bright:#f8fafc;--radius:16px;--transition:0.4s cubic-bezier(.4,0,.2,1)}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(circle,rgba(14,165,233,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(139,92,246,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{max-width:1100px;margin:0 auto;padding:24px 16px;position:relative;z-index:1}
h1{font-size:1.5rem;font-weight:700;color:var(--text-bright);margin-bottom:24px}
h1 span{color:var(--accent)}

/* City Tabs */
.city-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.city-tab{padding:10px 22px;border-radius:50px;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--text-dim);cursor:pointer;font-size:.875rem;font-weight:500;transition:var(--transition);user-select:none}
.city-tab:hover{background:rgba(14,165,233,0.1);color:var(--text);border-color:rgba(14,165,233,0.3)}
.city-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 20px var(--accent-glow)}

/* Glass Card */
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:24px;transition:var(--transition)}

/* Hero */
.hero{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;margin-bottom:20px;padding:32px}
.hero-temp{font-size:5rem;font-weight:700;color:var(--text-bright);line-height:1}
.hero-desc{font-size:1.125rem;color:var(--text-dim);margin-top:4px;text-transform:capitalize}
.hero-city{font-size:1.25rem;font-weight:600;color:var(--text);margin-top:8px}
.hero-date{font-size:.875rem;color:var(--text-dim);margin-top:2px}
.hero-feels{font-size:.875rem;color:var(--accent);margin-top:8px}
.hero-icon{font-size:6rem;text-align:center;filter:drop-shadow(0 0 20px rgba(14,165,233,0.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{text-align:center;padding:20px 12px}
.stat-icon{font-size:1.5rem;margin-bottom:6px}
.stat-value{font-size:1.35rem;font-weight:700;color:var(--text-bright)}
.stat-label{font-size:.75rem;color:var(--text-dim);margin-top:2px}

/* Hourly Forecast */
.section-title{font-size:1rem;font-weight:600;color:var(--text-bright);margin-bottom:14px}
.hourly-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent}
.hourly-scroll::-webkit-scrollbar{height:4px}
.hourly-scroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
.hourly-card{min-width:90px;text-align:center;padding:16px 12px;flex-shrink:0}
.hourly-time{font-size:.75rem;color:var(--text-dim);margin-bottom:8px}
.hourly-icon{font-size:1.75rem;margin-bottom:8px}
.hourly-temp{font-size:1rem;font-weight:600;color:var(--text-bright)}

/* 7-Day Forecast */
.daily-list{margin-bottom:20px}
.daily-row{display:grid;grid-template-columns:100px 40px 1fr 80px;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--glass-border)}
.daily-row:last-child{border-bottom:none}
.daily-day{font-size:.9rem;font-weight:500;color:var(--text)}
.daily-icon{font-size:1.3rem;text-align:center}
.daily-bar-wrap{display:flex;align-items:center;gap:10px}
.daily-low{font-size:.8rem;color:var(--text-dim);min-width:32px;text-align:right}
.daily-bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;position:relative}
.daily-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#8b5cf6);transition:width var(--transition)}
.daily-high{font-size:.8rem;color:var(--text-bright);font-weight:600;min-width:32px}
.daily-rain{font-size:.75rem;color:var(--accent);text-align:right}

/* Chart */
.chart-wrap{margin-bottom:20px;padding:24px}
.chart-wrap canvas{max-height:220px}

/* Details Grid */
.details-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.detail-card{padding:20px}
.detail-label{font-size:.75rem;color:var(--text-dim);margin-bottom:6px}
.detail-value{font-size:1.1rem;font-weight:600;color:var(--text-bright)}
.detail-sub{font-size:.75rem;color:var(--text-dim);margin-top:2px}
.aqi-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);margin-top:8px;overflow:hidden}
.aqi-fill{height:100%;border-radius:3px;transition:width var(--transition)}

/* Fade animation */
.fade-section{opacity:1;transform:translateY(0);transition:opacity 0.3s,transform 0.3s}
.fade-section.fading{opacity:0;transform:translateY(8px)}

/* Responsive */
@media(max-width:768px){
  .hero{grid-template-columns:1fr;text-align:center;padding:24px}
  .hero-icon{font-size:4rem}
  .hero-temp{font-size:3.5rem}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .details-grid{grid-template-columns:1fr}
  .daily-row{grid-template-columns:80px 32px 1fr 60px}
}
@media(max-width:480px){
  .city-tabs{gap:6px}
  .city-tab{padding:8px 16px;font-size:.8rem}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px}
}
</style>
</head>

const cities = Object.keys(weatherData);
let activeCity = "Islamabad";
let tempChart = null;

function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function renderTabs() {
  const tabs = document.getElementById('cityTabs');
  tabs.innerHTML = cities.map(c =>
    `<div class="city-tab${c === activeCity ? ' active' : ''}" onclick="switchCity('${c}')">${c}</div>`
  ).join('');
}

function renderApp(d, city) {
  const dayLabels = d.daily.map(x => x.day);
  return `
    <!-- Hero -->
    <div class="glass hero">
      <div>
        <div class="hero-temp">${d.temp}°C</div>
        <div class="hero-desc">${d.desc}</div>
        <div class="hero-city">${city}</div>
        <div class="hero-date">${formatDate()}</div>
        <div class="hero-feels">Feels like ${d.feels}°C</div>
      </div>
      <div class="hero-icon">${d.icon}</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="glass stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-value">${d.humidity}%</div>
        <div class="stat-label">Humidity</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-icon">💨</div>
        <div class="stat-value">${d.wind}</div>
        <div class="stat-label">Wind km/h</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-icon">☀️</div>
        <div class="stat-value">${d.uv}</div>
        <div class="stat-label">UV Index</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-value">${d.visibility}</div>
        <div class="stat-label">Visibility km</div>
      </div>
    </div>

    <!-- 24-Hour Forecast -->
    <div class="section-title">24-Hour Forecast</div>
    <div class="hourly-scroll">
      ${d.hourly.map(h => `
        <div class="glass hourly-card">
          <div class="hourly-time">${h.time}</div>
          <div class="hourly-icon">${h.icon}</div>
          <div class="hourly-temp">${h.temp}°</div>
        </div>
      `).join('')}
    </div>

    <!-- 7-Day Forecast -->
    <div class="section-title">7-Day Forecast</div>
    <div class="glass daily-list">
      ${d.daily.map(day => {
        const range = 50;
        const barPct = ((day.high - day.low) / range) * 100;
        return `
        <div class="daily-row">
          <div class="daily-day">${day.day}</div>
          <div class="daily-icon">${day.icon}</div>
          <div class="daily-bar-wrap">
            <span class="daily-low">${day.low}°</span>
            <div class="daily-bar"><div class="daily-bar-fill" style="width:${barPct}%"></div></div>
            <span class="daily-high">${day.high}°</span>
          </div>
          <div class="daily-rain">💧 ${day.rain}%</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Temperature Trend Chart -->
    <div class="section-title">Temperature Trend</div>
    <div class="glass chart-wrap">
      <canvas id="tempChart"></canvas>
    </div>

    <!-- Details Grid -->
    <div class="section-title">Weather Details</div>
    <div class="details-grid">
      <div class="glass detail-card">
        <div class="detail-label">Sunrise & Sunset</div>
        <div class="detail-value">🌅 ${d.sunrise}</div>
        <div class="detail-sub">🌇 ${d.sunset}</div>
      </div>
      <div class="glass detail-card">
        <div class="detail-label">Pressure</div>
        <div class="detail-value">${d.pressure} hPa</div>
        <div class="detail-sub">Normal</div>
      </div>
      <div class="glass detail-card">
        <div class="detail-label">Dew Point</div>
        <div class="detail-value">${d.dewPoint}°C</div>
        <div class="detail-sub">${d.dewPoint > 18 ? 'Humid' : d.dewPoint > 10 ? 'Comfortable' : 'Dry'}</div>
      </div>
      <div class="glass detail-card">
        <div class="detail-label">Air Quality Index</div>
        <div class="detail-value" style="color:${d.aqiColor}">${d.aqi} — ${d.aqiLabel}</div>
        <div class="aqi-bar"><div class="aqi-fill" style="width:${d.aqiPct}%;background:${d.aqiColor}"></div></div>
      </div>
    </div>
  `;
}

function buildChart(d) {
  const ctx = document.getElementById('tempChart');
  if (!ctx) return;
  if (tempChart) { tempChart.destroy(); tempChart = null; }
  const labels = d.daily.map(x => x.day);
  tempChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'High °C',
        data: d.chartTemps,
        borderColor: '#0EA5E9',
        backgroundColor: 'rgba(14,165,233,0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#0EA5E9',
        pointRadius: 5,
        pointHoverRadius: 7
      }, {
        label: 'Low °C',
        data: d.daily.map(x => x.low),
        borderColor: '#8b5cf6',
        backgroundColor: 'rgba(139,92,246,0.08)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#8b5cf6',
        pointRadius: 5,
        pointHoverRadius: 7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { family: 'Inter' } } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', font: { family: 'Inter' } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#94a3b8', font: { family: 'Inter' }, callback: v => v + '°' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function switchCity(city) {
  if (city === activeCity) return;
  activeCity = city;
  renderTabs();
  const app = document.getElementById('app');
  app.classList.add('fading');
  setTimeout(() => {
    app.innerHTML = renderApp(weatherData[city], city);
    buildChart(weatherData[city]);
    app.classList.remove('fading');
  }, 300);
}

// Initial render
renderTabs();
document.getElementById('app').innerHTML = renderApp(weatherData[activeCity], activeCity);
buildChart(weatherData[activeCity]);
</script>
</body>
